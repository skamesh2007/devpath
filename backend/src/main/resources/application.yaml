gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash

spring:
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${SECRET_KEY}
  expiration: 86400000

server:
  port: ${PORT:8080}